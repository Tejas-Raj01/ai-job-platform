
services:
  db:
    image: postgres:15-alpine
    container_name: job_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpassword
      POSTGRES_DB: jobplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job_platform_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: job_platform_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=jobplatform
      - DB_USERNAME=jobuser
      - DB_PASSWORD=jobpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: php -d upload_max_filesize=64M -d post_max_size=64M -d memory_limit=256M artisan serve --host=0.0.0.0 --port=8000

  queue_worker:
    build:
      context: ./backend
    container_name: job_platform_queue_worker
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=jobplatform
      - DB_USERNAME=jobuser
      - DB_PASSWORD=jobpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - backend
      - redis
    command: php artisan queue:work

  frontend:
    build:
      context: ./frontend
    container_name: job_platform_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - PORT=5173
    depends_on:
      - backend


volumes:
  postgres_data:
